version: '3.8'

services:
  employee-backend:
    image: ghcr.io/avegabros/avpass-backend:latest
    container_name: employee-backend
    ports:
      - "3000:5000"
    environment:
      - PORT=5000
    env_file:
      - .env
    volumes:
      - backend-data:/app/backend/data
    restart: unless-stopped

  employee-frontend:
    image: ghcr.io/avegabros/avpass-frontend:latest
    container_name: employee-frontend
    ports:
      - "8001:8001"
    depends_on:
      - employee-backend
    restart: unless-stopped

volumes:
  backend-data:
